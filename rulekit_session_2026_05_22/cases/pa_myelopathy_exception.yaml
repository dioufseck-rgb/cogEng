case_id: pa-myelopathy-exception

description: |
  Cervical spinal surgery authorization request invoking the myelopathy
  exception pathway.

  DIAGNOSIS: Cervical myelopathy is the member's primary diagnosis,
  documented and confirmed with spinal cord compression on imaging.
  Member presents with myelopathic clinical findings including gait
  disturbance, bilateral upper extremity weakness, hyperreflexia, and
  a positive Hoffman sign. Member does not have bowel/bladder
  dysfunction. Member does not have cervical radiculopathy as a
  separate primary diagnosis (no nerve root compression on imaging,
  no radicular pain, numbness, or weakness in dermatomal distribution).
  Member does not have cervical disc herniation as a separate
  diagnosis. Myelopathy is not a secondary finding to a primary
  radiculopathy complaint; myelopathy is the primary complaint.

  IMAGING: MRI of the cervical spine performed 1 month ago demonstrates
  spinal cord compression at C4-C5 and structural pathology consistent
  with the member's myelopathic symptoms and with the proposed surgical
  level. No CT myelogram was performed. The imaging was interpreted by
  a radiologist. The treating specialist did not separately interpret
  the imaging.

  CONSERVATIVE TREATMENT - PHYSICAL THERAPY (myelopathy exception):
  Member completed 4 weeks of supervised physical therapy under the
  reduced duration permitted by the myelopathy exception. Member did
  NOT complete the standard 6 weeks of physical therapy. The physical
  therapy was directed toward the cervical condition for which surgery
  is being requested. Functional outcomes were documented throughout
  the course.

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Pharmacotherapy requirement
  remains in full under the myelopathy exception. Member trialed
  naproxen 500mg BID for 6 weeks (an NSAID, exceeding 4-week minimum).
  Member also trialed gabapentin 300mg TID for 5 weeks (a neuropathic
  agent, exceeding 4-week minimum). Member did not trial a COX-2
  inhibitor, did not trial a muscle relaxant, did not trial pregabalin,
  did not trial duloxetine, and did not trial oral corticosteroids.

  CONSERVATIVE TREATMENT - INTERVENTIONAL (waived): The treating
  physician has documented in writing that interventional treatment
  poses risk of neurological deterioration given the member's
  myelopathic findings. Interventional treatment was therefore waived
  under the myelopathy exception. Member did not receive a cervical
  epidural steroid injection. Member did not receive a cervical medial
  branch block. Member did not receive a trigger point injection
  series.

  PHYSICIAN DOCUMENTATION: Treating physician has provided written
  attestation that conservative treatment has been completed under the
  myelopathy exception. Treating physician has provided clinical
  rationale for surgical intervention. Treating physician has provided
  description of functional limitations. Treating physician has
  provided a written statement of surgical risks and a written
  statement of alternatives considered.

expected_outcomes:
  pa.D1: true
  pa.D2: false
