# Case template for the comparison study.
# Copy this file to bank/policy1/<case_id>.yaml (or policy2/, policy3/) and
# fill in. Cases are authored before any system runs (Protocol Section 9.2).

# Required fields
case_id: <unique_identifier>             # e.g. pa-level1-std-001
policy: pa | fcba | policy3              # which policy this case is for
difficulty_level: 1                      # integer 1-10 per Section 3.3
case_class: main                         # main | adversarial_rulekit | adversarial_llm | validation
tags:                                    # descriptive tags (informational)
  - canonical_positive
  - standard_pathway

description: |
  The natural-language case description. 200-800 words is the target
  range. Describe the case as the institution would document it: with
  enough specificity for an adjudicator to evaluate every policy
  requirement, but in the surface form the institution's documentation
  would naturally use.

  Both systems receive this verbatim. RuleKit's Map binds it to the
  build's atoms. Direct LLM reads it alongside the full policy.

  Be explicit about negative facts as well as positive ones. If a
  pharmacotherapy class was not trialed, state that. If the case is
  closed-world with respect to a category, say so. Map's accuracy
  depends on the description's specificity about what is absent as
  well as what is present.

# Required: the expected determination(s)
expected_outcomes:
  pa.D1: true                            # or false, or undetermined
  pa.D2: false

# Required: load-bearing requirements (Section 6.4 traceability metric)
# Natural-language phrases. The matching judge compares these to system
# output to score traceability F1. List the policy requirements you (the
# case author) believe drive the determination for this case.
load_bearing_annotation:
  - "Member has a qualifying cervical diagnosis"
  - "MRI within 6 months demonstrates structural pathology"
  - "6 weeks of supervised PT directed at cervical condition"
  - "At least 2 pharmacotherapy classes trialed ≥4 weeks each"
  - "One interventional treatment completed (ESI)"
  - "All four physician documentation atoms provided"

# Optional: expected bundle (for Map binding diagnostic)
# Used to compare RuleKit's Map output against author intent at the
# atom level. Useful when you want to verify Map binding directly.
# Comment out if you don't want to author atom-level expectations.
# expected_bundle:
#   pa.a001: true
#   pa.a002: true
#   pa.a003: false

# Required: authoring rationale (not shown to systems)
# Briefly explain what the case is testing. Why was it constructed?
# What system behavior do you expect? Reviewers use this to verify
# the case was authored deliberately, not to fit a desired result.
authoring_notes: |
  Canonical positive standard-pathway case for PA Section 2.
  Tests that the build produces an approval when every required element
  is documented in the standard pathway. No exception pathway in play.
  No partial evidence. This is the simplest correctness check.

  Both systems should produce D1=true, D2=false. RuleKit's bundle
  should bind 20 atoms to true, ~25 to false, 0 to undetermined.
