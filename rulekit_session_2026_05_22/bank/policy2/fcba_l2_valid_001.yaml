case_id: fcba-l2-valid-001
policy: fcba
difficulty_level: 2
case_class: main
tags:
  - canonical_negative
  - valid_charge
description: |
  Credit card transaction questioned but not a billing error under
  § 1026.13(a).

  The cardholder's periodic statement reflects an $89.50 charge to a
  streaming service. The cardholder initially didn't recognize the
  charge and contacted the creditor.

  Upon investigation, the cardholder confirmed they DID make the
  transaction. The charge was for a streaming subscription the
  cardholder had signed up for and forgotten. They authorized the
  charge at subscription.

  No unauthorized use: the cardholder made the transaction. No
  other person involved.

  The transaction was properly identified on the periodic statement
  per Regulation Z formatting.

  No property-or-services issue: the streaming service was delivered
  and accepted by the cardholder.

  No payment-crediting issue. No computational error. No
  documentary-evidence request. Statement mailed and delivered.
expected_outcomes:
  fcba.D1: "false"
  fcba.D2: "true"
load_bearing_annotation:
  - Cardholder made the transaction (no unauthorized use)
  - Properly identified on statement
  - No undelivered services
  - No other billing-error category applies
authoring_notes: |
  Canonical Level 2 denial — no category of § 1026.13(a) is
  satisfied. Tests that the OR-of-7-categories correctly evaluates
  FALSE when no category applies.
