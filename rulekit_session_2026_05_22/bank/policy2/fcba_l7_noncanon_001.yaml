case_id: fcba-l7-noncanon-001
policy: fcba
difficulty_level: 7
case_class: main
tags:
  - non_canonical_surface
description: |
  Ms. Roberts called the bank's dispute line on the 14th. Her account
  statement that arrived in the mail last week had a charge she
  didn't make — $402.18 to some company she'd never heard of, posted
  October 22nd. She's been carrying her card the whole month, didn't
  give the number to anyone, and is the only one on the account. Her
  husband isn't an authorized user, no kids, no one else has the
  card.

  The bank's first take: data breach is plausible — the merchant
  charge appears alongside a couple of others from her recent online
  shopping, all legitimate. The fraud team flagged it.

  The statement itself is fine in format — merchant name, date,
  amount all clear and per the bank's usual layout. The statement
  did arrive in the mail at her address as expected (she's holding
  it in her hand on the call). It's not about something she ordered
  and didn't receive — she never even heard of the company. Math on
  the statement adds up. She's not asking for copies of paperwork —
  she just wants the charge off.
expected_outcomes:
  fcba.D1: "true"
  fcba.D2: "false"
load_bearing_annotation:
  - Cardholder did not make the transaction
  - No one else has actual/implied/apparent authority
  - Charge appears on properly-formatted statement
authoring_notes: |
  Level 7: same facts as the L1 unauthorized case, rendered in
  conversational call-log voice. Tests Map's robustness to non-
  standard surface form. Should evaluate the same as the canonical
  L1 case.
