description: 'Cervical spinal surgery authorization request with documented partial

  evidence.


  DIAGNOSIS: Cervical radiculopathy at C5-C6 with confirmed nerve root

  compression demonstrated on MRI imaging. Member has radicular pain

  and radicular numbness in C5 dermatomal distribution. Whether the

  patient also has radicular weakness is not documented in the medical

  record. Member does not have cervical myelopathy. There is no spinal

  cord compression. Member does not have cervical disc herniation as a

  separate diagnosis.


  IMAGING: MRI of the cervical spine performed 2 months ago demonstrates

  structural pathology (foraminal stenosis at C5-C6 with nerve root

  compression). The structural pathology is consistent with the member''s

  radicular symptoms and with the proposed surgical level (C5-C6). No

  CT myelogram. The imaging was interpreted by a radiologist; no

  separate specialist interpretation.


  CONSERVATIVE TREATMENT - PHYSICAL THERAPY: Member completed physical

  therapy directed at the cervical condition. The exact duration of the

  physical therapy course is not documented in the available record.

  Whether the therapy was supervised is not documented. Functional

  outcomes have not been documented.


  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Member trialed naproxen

  500mg BID. The trial duration is not documented. Member also trialed

  gabapentin 300mg TID; the trial duration is not documented. Member

  did not trial a COX-2 inhibitor, a muscle relaxant, pregabalin,

  duloxetine, or oral corticosteroids.


  CONSERVATIVE TREATMENT - INTERVENTIONAL: Member received one cervical

  epidural steroid injection at C5-C6. No medial branch block. No

  trigger point injection series.


  MYELOPATHY EXCEPTION: Does not apply. No myelopathy.


  PHYSICIAN DOCUMENTATION: Treating physician has provided attestation

  of conservative treatment and clinical rationale for surgical

  intervention. Treating physician has provided description of

  functional limitations. Treating physician has provided a statement

  of surgical risks and alternatives considered.'
