policy: pa
difficulty_level: 3
case_class: validation
tags:
  - myelopathy_exception
  - validation
description: |
  PA request invoking the myelopathy exception pathway.

  DIAGNOSIS: Cervical myelopathy is the primary documented diagnosis,
  confirmed with spinal cord compression at C4-C5 on MRI. Member
  exhibits gait disturbance, bilateral upper extremity weakness,
  hyperreflexia, and positive Hoffman sign. No bowel/bladder
  dysfunction. No cervical radiculopathy as primary complaint;
  myelopathy is the primary diagnosis, not secondary to a
  radiculopathy.

  IMAGING: MRI 1 month ago demonstrates cord compression at C4-C5
  consistent with myelopathic symptoms and proposed surgical level.
  Radiologist interpretation.

  CONSERVATIVE TREATMENT - PT (myelopathy exception): 4 weeks of
  supervised PT directed at cervical with documented functional
  outcomes. This meets the reduced exception threshold of 4 weeks
  (below the standard 6-week minimum that would otherwise apply).

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY (full requirement): Trialed
  naproxen 500mg BID for 6 weeks (NSAID) and gabapentin 300mg TID for
  5 weeks (neuropathic agent).

  CONSERVATIVE TREATMENT - INTERVENTIONAL (waived): Treating physician
  has documented in writing that interventional treatment poses risk
  of neurological deterioration given the member's myelopathic
  findings. Interventional treatment is therefore waived under the
  myelopathy exception. No ESI, no medial branch block, no trigger
  point injection performed.

  PHYSICIAN DOCUMENTATION: All four elements provided.
expected_outcomes:
  pa.D1: "true"
  pa.D2: "false"
load_bearing_annotation:
  - Cervical myelopathy is the primary diagnosis (criterion 2.1(b))
  - Imaging demonstrates cord compression at surgical level
  - 4 weeks of supervised PT (exception threshold)
  - Two pharmacotherapy classes ≥4 weeks (full requirement preserved)
  - Physician documented interventional risk → waiver invoked
authoring_notes: |
  Validation Level 3: exception pathway case. Tests reduced PT
  threshold (4 weeks) and interventional waiver. Pharmacotherapy
  requirement remains in full per the exception clause.
