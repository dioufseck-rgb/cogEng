policy: pa
difficulty_level: 8
case_class: main
tags:
- boundary_condition
- pharmacotherapy_threshold
description: 'Cervical spinal surgery authorization request at a boundary condition.


  DIAGNOSIS: Cervical radiculopathy at C6-C7 with confirmed nerve root

  compression demonstrated on MRI imaging. Member presents with

  radicular pain and radicular weakness in C6 dermatomal distribution.

  Member does not have radicular numbness. Member does not have

  cervical myelopathy. No spinal cord compression. No cervical disc

  herniation as a separate diagnosis.


  IMAGING: MRI of the cervical spine performed 4 months ago demonstrates

  structural pathology consistent with the member''s radicular symptoms

  and the proposed surgical level (C6-C7). No CT myelogram. The

  imaging was interpreted by a radiologist.


  CONSERVATIVE TREATMENT - PHYSICAL THERAPY: Member completed exactly

  6 weeks of supervised physical therapy directed at the cervical

  condition (the minimum required duration). Functional outcomes were

  documented.


  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Member trialed naproxen

  500mg BID for 4 weeks (an NSAID, exactly meeting the 4-week

  minimum). Member did NOT trial any other pharmacotherapy class.

  Specifically: no COX-2 inhibitor, no muscle relaxant, no gabapentin,

  no pregabalin, no duloxetine, and no oral corticosteroids.


  Only 1 of 4 required pharmacotherapy classes was trialed; the policy

  requires at least 2.


  CONSERVATIVE TREATMENT - INTERVENTIONAL: Member received one cervical

  epidural steroid injection at C6-C7. No medial branch block. No

  trigger point injection series.


  MYELOPATHY EXCEPTION: Does not apply.


  PHYSICIAN DOCUMENTATION: Treating physician has provided attestation

  of conservative treatment, clinical rationale for surgical intervention,

  description of functional limitations, and a statement of surgical

  risks and alternatives considered.'
expected_outcomes:
  pa.D1: 'false'
  pa.D2: 'true'
load_bearing_annotation:
- 'At least 2 of 4 pharmacotherapy classes required (case has only 1: NSAID)'
- "Pharmacotherapy threshold not met \u2192 standard pathway fails \u2192 D1=false"
authoring_notes: 'Level 8 case: tests boundary on the AT-LEAST-2-of-4 pharmacotherapy

  requirement. Case satisfies all other standard-pathway requirements

  but only trialed one pharmacotherapy class. Expected: D1=false

  because at-least-2 cannot be satisfied; D2=true (complement).

  Tests whether the AT-LEAST-N operator correctly enforces the

  threshold rather than smoothing over it.'
