description: |
  PA request for cervical spinal surgery via the disc-herniation
  diagnostic branch.

  DIAGNOSIS: Cervical disc herniation at C6-C7 confirmed on MRI,
  with objective neurological deficit on examination (diminished
  biceps reflex, weakness in the C7 myotome). Not cervical
  radiculopathy as a separate diagnosis. Not cervical myelopathy.

  IMAGING: MRI 3 months ago demonstrates a contained disc herniation
  at C6-C7 consistent with the documented neurological deficit at the
  proposed surgical level. Radiologist interpretation.

  CONSERVATIVE TREATMENT - PHYSICAL THERAPY: 7 weeks of supervised PT
  directed at the cervical condition with documented functional
  outcomes.

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Trialed meloxicam for 5
  weeks (NSAID) and pregabalin for 4 weeks (neuropathic agent).

  CONSERVATIVE TREATMENT - INTERVENTIONAL: Two cervical epidural
  steroid injections completed.

  MYELOPATHY EXCEPTION: Not applicable.

  PHYSICIAN DOCUMENTATION: All four elements provided.
expected_outcomes:
  pa.D1: "true"
  pa.D2: "false"
load_bearing_annotation:
  - Disc herniation with objective neurological deficit (criterion 2.1(c))
  - MRI demonstrates pathology at surgical level
  - 6 weeks supervised PT with documented outcomes
  - Two pharmacotherapy classes ≥4 weeks each
  - ESI completed
  - All physician documentation
authoring_notes: |
  Tests criterion 2.1(c) disc-herniation diagnostic pathway. Distinct
  from radiculopathy (which requires nerve root compression). Same
  positive outcome expected.
