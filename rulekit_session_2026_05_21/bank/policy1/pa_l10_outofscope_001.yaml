case_id: pa-l10-outofscope-001
policy: pa
difficulty_level: 10
case_class: main
tags:
  - out_of_scope
  - wrong_anatomical_region
description: |
  PA request that names cervical spinal surgery but the underlying
  facts describe a different anatomical region.

  DIAGNOSIS: Member has confirmed lumbar radiculopathy at L4-L5 with
  L4 nerve root compression on lumbar MRI. Radicular pain and
  numbness in the L4 dermatomal distribution (anterior thigh, medial
  shin). No cervical radiculopathy. No cervical myelopathy. No
  cervical disc herniation.

  IMAGING: MRI 2 months ago is of the LUMBAR spine, demonstrating
  pathology at L4-L5. No imaging of the cervical spine. The lumbar
  imaging is not consistent with any cervical pathology.

  CONSERVATIVE TREATMENT: 8 weeks supervised PT directed at the
  LUMBAR condition. Naproxen for 6 weeks, gabapentin for 5 weeks.
  Lumbar epidural steroid injection at L4-L5.

  MYELOPATHY EXCEPTION: Not applicable.

  PHYSICIAN DOCUMENTATION: Documentation exists but pertains to
  lumbar surgery, not cervical.

  Note: The authorization request form lists "cervical spinal
  surgery" as the requested procedure (per CPT 22551), but the
  underlying clinical picture is entirely lumbar. This is the
  type of case the cervical policy was not written to anticipate.
expected_outcomes:
  pa.D1: "false"
  pa.D2: "true"
load_bearing_annotation:
  - No cervical qualifying diagnosis (all diagnoses are lumbar)
  - Cervical imaging requirement not met (imaging is lumbar)
  - PT not directed at cervical condition
authoring_notes: |
  Level 10: out-of-scope facts. The cervical policy correctly fails
  this case at the diagnosis branch (no cervical qualifying
  condition documented). Tests that the build doesn't mis-route
  lumbar findings into cervical atoms.
