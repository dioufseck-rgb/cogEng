case_id: fcba-val-l5-001
policy: fcba
difficulty_level: 5
case_class: validation
tags:
  - partial_evidence
  - load_bearing_gaps
  - validation
description: |
  Credit card dispute where investigation is incomplete on a critical
  element.

  The cardholder's periodic statement reflects a $267.40 extension of
  credit to a merchant the cardholder says they do not recognize.

  The cardholder states they did not make the transaction themselves.

  Whether any other person had actual, implied, or apparent authority
  to use the cardholder's card is not clearly established at the time
  of the dispute. The cardholder's spouse has used the card
  occasionally; whether the spouse made this specific transaction has
  not been confirmed. The investigation into possible authorized use
  by the spouse is incomplete.

  The transaction was properly identified on the periodic statement
  per Regulation Z. No property-or-services issue. No
  payment-crediting issue. No computational error. No documentary
  evidence framing.

  The creditor did mail and deliver the periodic statement.
expected_outcomes:
  fcba.D1: "undetermined"
  fcba.D2: "undetermined"
load_bearing_annotation:
  - Whether spouse had actual/implied/apparent authority — undetermined
  - Whether spouse made the transaction — undetermined
authoring_notes: |
  Validation Level 5: gap on a load-bearing atom (the
  authority-to-use determination, which controls whether the
  unauthorized-charge pathway applies). Expected: UNDETERMINED,
  honestly reported.
