case_id: fcba-val-l2-001
policy: fcba
difficulty_level: 2
case_class: validation
tags:
  - canonical_negative
  - valid_charge
  - validation
description: |
  Cardholder initially questioned a charge but the dispute does not
  qualify as a billing error under § 1026.13(a).

  The cardholder's periodic statement reflects an $89.50 charge to a
  streaming-service merchant. The cardholder initially did not
  recognize the charge name on the statement and contacted the
  creditor.

  Upon follow-up, the cardholder confirms they did make the
  transaction. The charge was for a streaming service subscription
  the cardholder had signed up for previously and forgotten about.
  The cardholder authorized the charge at the time of subscription.

  No unauthorized-use question: the transaction was made by the
  cardholder. No other person was involved.

  The transaction was properly identified on the periodic statement
  per Regulation Z formatting requirements. The merchant name and
  amount were clearly listed.

  No property-or-services dispute: the streaming service was
  delivered as agreed (the cardholder had access to the service for
  the billing period). The cardholder accepted the service by using
  it.

  No payment-crediting issue. No computational or accounting error;
  the math on the statement is correct.

  No request for clarification or documentary evidence under
  § 1026.13(a)(6) — once the cardholder recognized the charge, they
  did not pursue this category.

  The creditor did mail and deliver the periodic statement.
expected_outcomes:
  fcba.D1: "false"
  fcba.D2: "true"
load_bearing_annotation:
  - Cardholder made the transaction (not unauthorized)
  - No identification failure
  - No property/services non-delivery dispute
  - No payment-crediting issue
  - No computational error
  - No documentary-evidence request
  - Statement was mailed and delivered
authoring_notes: |
  Validation Level 2 (canonical negative). No category of § 1026.13(a)
  is satisfied. Tests that the OR-of-7 categories correctly evaluates
  FALSE when no category applies.
