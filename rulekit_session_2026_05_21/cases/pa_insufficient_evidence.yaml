case_id: pa-insufficient-evidence

description: |
  Cervical spinal surgery authorization request with partial
  documentation. The case has a qualifying diagnosis but several
  required elements have evidence that is unclear or unaddressed in
  the available records.

  DIAGNOSIS: Cervical radiculopathy at C5-C6 with confirmed nerve root
  compression demonstrated on MRI imaging. The member presents with
  radicular numbness; whether the member also has radicular pain or
  weakness is not clearly documented in the medical record (this is
  unclear). Whether the symptoms follow a strictly dermatomal
  distribution is also not clearly documented. Member does not have
  cervical myelopathy. Member does not have cervical disc herniation
  as a separate diagnosis.

  IMAGING: MRI of the cervical spine performed 2 months ago demonstrates
  structural pathology. Whether the structural pathology is consistent
  with the member's symptoms is unclear from the record. Whether the
  imaging is consistent with the proposed surgical level is not
  documented. The imaging was interpreted by a radiologist.

  CONSERVATIVE TREATMENT - PHYSICAL THERAPY: Member completed at least
  6 weeks of physical therapy that was supervised and directed toward
  the cervical condition. Whether functional outcomes were documented
  is unclear from the available record.

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Member trialed naproxen
  (NSAID) for 6 weeks (exceeding 4 weeks). Whether a muscle relaxant
  was trialed is unclear. Whether a neuropathic agent (gabapentin,
  pregabalin, or duloxetine) was trialed is unclear from the record.
  Member did not trial a COX-2 inhibitor and did not trial oral
  corticosteroids.

  CONSERVATIVE TREATMENT - INTERVENTIONAL: Member received one cervical
  epidural steroid injection. No medial branch block. No trigger point
  injection series.

  MYELOPATHY EXCEPTION: Does not apply. Member does not have myelopathy.

  PHYSICIAN DOCUMENTATION: Treating physician has provided attestation
  of conservative treatment and clinical rationale for surgery.
  Whether the physician has provided a description of functional
  limitations is unclear from the record. Treating physician has
  provided a statement of surgical risks and alternatives considered.

expected_outcomes:
  pa.D1: undetermined
  pa.D2: undetermined
