case_id: fcba-undetermined

description: |
  Credit card billing dispute with partial evidence. The consumer
  alleges an unauthorized charge but several facts needed for the
  determination are unclear from the available record.

  The consumer's periodic credit card statement reflects an extension
  of credit of $267.40 to a merchant the consumer says they do not
  recognize.

  The consumer states they did NOT make the transaction themselves.

  Whether any other person had authority (actual, implied, or
  apparent) to use the consumer's card is UNCLEAR from the available
  record. The consumer's spouse uses the card occasionally; whether
  the spouse made this specific transaction has not been determined.
  The investigation into authorized users is incomplete.

  The transaction was properly identified on the periodic statement
  per the formatting requirements of Regulation Z.

  No property-or-services dispute. The transaction is not about goods
  not delivered or not accepted.

  No failure-to-credit issue. No computational or other accounting
  error.

  The consumer has not framed this as a request for clarification or
  documentary evidence under § 1026.13(a)(6).

  The creditor did mail and did deliver a periodic statement to the
  consumer.

expected_outcomes:
  fcba.D1: undetermined
  fcba.D2: undetermined
