<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, sans-serif">
  <rect width="900" height="580" fill="white"/>

  <text x="450" y="32" font-size="18" font-weight="bold" text-anchor="middle" fill="#222">Sensitivity Result: PA Standard Approval</text>
  <text x="450" y="52" font-size="12" text-anchor="middle" fill="#666">Build of 55 atoms; bundle seeded by Map; determination evaluates to TRUE</text>

  <!-- Two-column layout: load-bearing vs non-load-bearing -->

  <!-- LEFT: Load-bearing -->
  <rect x="50" y="80" width="380" height="170" fill="#FCEFEC" stroke="#C25450" stroke-width="1.5" rx="6"/>
  <text x="240" y="105" font-size="14" font-weight="bold" text-anchor="middle" fill="#7a2e2c">20 Load-bearing atoms</text>
  <text x="240" y="123" font-size="11" font-style="italic" text-anchor="middle" fill="#666">dropping any one → determination becomes UNDETERMINED</text>

  <text x="65" y="148" font-size="11" font-weight="bold" fill="#444">Map exactly to the policy's required elements:</text>
  <text x="75" y="167" font-size="11" fill="#333">• nerve root compression + symptom correlation</text>
  <text x="75" y="184" font-size="11" fill="#333">• MRI within 6 months, structural pathology at level</text>
  <text x="75" y="201" font-size="11" fill="#333">• PT: 6-week, supervised, outcomes, cervical-directed</text>
  <text x="75" y="218" font-size="11" fill="#333">• 2 pharmacotherapy classes each ≥ 4 weeks</text>
  <text x="75" y="235" font-size="11" fill="#333">• one interventional treatment (ESI)</text>
  <text x="75" y="247" font-size="11" fill="#333">• all four physician documentation atoms</text>

  <!-- RIGHT: Non-load-bearing -->
  <rect x="470" y="80" width="380" height="170" fill="#EBF5E8" stroke="#5A8C45" stroke-width="1.5" rx="6"/>
  <text x="660" y="105" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c5d1b">35 Non-load-bearing atoms</text>
  <text x="660" y="123" font-size="11" font-style="italic" text-anchor="middle" fill="#666">dropping any one → determination still TRUE</text>

  <text x="485" y="148" font-size="11" font-weight="bold" fill="#444">Three robustness categories:</text>
  <text x="495" y="167" font-size="11" fill="#333">• alternative pathway (myelopathy exception) atoms</text>
  <text x="495" y="184" font-size="11" fill="#333">• alternative atoms in satisfied disjunctions</text>
  <text x="495" y="201" font-size="11" fill="#333">    (CT myelogram unused; case used MRI)</text>
  <text x="495" y="218" font-size="11" fill="#333">• OR-redundant evidence within a category</text>
  <text x="495" y="231" font-size="11" fill="#333">    (any of 3 radicular symptoms suffices)</text>

  <!-- Cumulative degradation curve -->
  <text x="450" y="290" font-size="14" font-weight="bold" text-anchor="middle" fill="#222">Cumulative degradation curve (non-load-bearing first, then load-bearing)</text>

  <!-- Plot area -->
  <line x1="100" y1="510" x2="100" y2="320" stroke="#222" stroke-width="1.5"/>
  <line x1="100" y1="510" x2="850" y2="510" stroke="#222" stroke-width="1.5"/>

  <!-- Y axis labels -->
  <text x="92" y="335" font-size="10" text-anchor="end" fill="#444">TRUE</text>
  <text x="92" y="425" font-size="10" text-anchor="end" fill="#444">UNDETERMINED</text>

  <!-- X axis labels -->
  <text x="100" y="528" font-size="10" text-anchor="middle" fill="#444">0</text>
  <text x="270" y="528" font-size="10" text-anchor="middle" fill="#444">2</text>
  <text x="295" y="528" font-size="10" text-anchor="middle" fill="#444">3</text>
  <text x="430" y="528" font-size="10" text-anchor="middle" fill="#444">20</text>
  <text x="700" y="528" font-size="10" text-anchor="middle" fill="#444">35</text>
  <text x="850" y="528" font-size="10" text-anchor="middle" fill="#444">55</text>
  <text x="475" y="548" font-size="11" font-style="italic" text-anchor="middle" fill="#555">Atoms dropped (cumulative)</text>

  <!-- The TRUE plateau (steps 0-2): non-load-bearing absorbs 2 -->
  <line x1="100" y1="335" x2="295" y2="335" stroke="#5A8C45" stroke-width="3"/>

  <!-- The UNDETERMINED plateau (steps 3-55) -->
  <line x1="295" y1="335" x2="295" y2="425" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="295" y1="425" x2="850" y2="425" stroke="#C25450" stroke-width="3"/>

  <!-- Marker for inflection point -->
  <circle cx="295" cy="335" r="5" fill="#5A8C45"/>
  <circle cx="295" cy="425" r="5" fill="#C25450"/>

  <!-- Annotation for inflection -->
  <text x="310" y="345" font-size="11" font-weight="bold" fill="#7a2e2c">Inflection at step 3</text>
  <text x="310" y="362" font-size="10" fill="#444">3rd radicular-symptom atom dropped;</text>
  <text x="310" y="376" font-size="10" fill="#444">OR over [pain, numbness, weakness]</text>
  <text x="310" y="390" font-size="10" fill="#444">can no longer be satisfied → U</text>

  <!-- After load-bearing starts -->
  <text x="640" y="445" font-size="10" font-style="italic" fill="#666">all load-bearing → U: outcome stable at U</text>
</svg>
