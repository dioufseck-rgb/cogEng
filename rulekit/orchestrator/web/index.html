<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RuleKit Builder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">RK</div>
          <div>
            <h1>RuleKit Builder</h1>
            <p id="workspace-name">Loading</p>
          </div>
        </div>
        <nav class="rail" aria-label="Builder sections">
          <button class="rail-item active" data-view="overview">Overview</button>
          <button class="rail-item" data-view="program">Program</button>
          <button class="rail-item" data-view="graph">DAG</button>
          <button class="rail-item" data-view="cases">Cases</button>
          <button class="rail-item" data-view="map">Map</button>
          <button class="rail-item" data-view="actions">Actions</button>
          <button class="rail-item" data-view="timeline">Timeline</button>
          <button class="rail-item" data-view="reports">Reports</button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <div class="eyebrow" id="trajectory-id">Trajectory</div>
            <h2 id="page-title">Overview</h2>
          </div>
          <div class="status-row">
            <span class="status-pill" id="validation-status">Validation</span>
            <span class="status-pill neutral" id="active-branch">Branch</span>
          </div>
        </header>

        <section class="metrics" aria-label="Workspace metrics">
          <div class="metric">
            <span>Events</span>
            <strong id="metric-events">0</strong>
          </div>
          <div class="metric">
            <span>Branches</span>
            <strong id="metric-branches">0</strong>
          </div>
          <div class="metric">
            <span>Cases</span>
            <strong id="metric-cases">0</strong>
          </div>
          <div class="metric">
            <span>Reports</span>
            <strong id="metric-reports">0</strong>
          </div>
        </section>

        <section class="content-grid">
          <div class="panel primary-panel" id="primary-panel"></div>
          <div class="panel detail-panel" id="detail-panel"></div>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
