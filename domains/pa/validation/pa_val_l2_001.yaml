description: |
  PA request for cervical spinal surgery on a case lacking qualifying
  diagnosis.

  DIAGNOSIS: Member presents with chronic non-specific neck pain. No
  cervical radiculopathy: no nerve root compression documented, no
  radicular pain, numbness, or weakness in any dermatomal distribution.
  No cervical myelopathy: no spinal cord compression, no gait
  disturbance, no bilateral upper extremity weakness, no hyperreflexia,
  no Hoffman sign, no bowel/bladder dysfunction. No cervical disc
  herniation with objective neurological deficit.

  IMAGING: MRI shows only mild age-related degenerative changes, no
  structural pathology that would warrant surgery, not consistent with
  any specific symptom pattern (no specific symptoms beyond
  generalized neck pain).

  CONSERVATIVE TREATMENT: 8 weeks of supervised PT with documented
  functional outcomes. Trialed naproxen for 6 weeks and gabapentin for
  5 weeks. One ESI. (Conservative treatment is completed but moot
  without a qualifying diagnosis.)

  PHYSICIAN DOCUMENTATION: All four elements provided.
expected_outcomes:
