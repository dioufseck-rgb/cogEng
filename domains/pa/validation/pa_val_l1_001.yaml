description: |
  PA request for cervical spinal surgery.

  DIAGNOSIS: Cervical radiculopathy at C5-C6 with confirmed nerve root
  compression. Radicular pain and numbness in C5 dermatomal distribution.
  No cervical myelopathy. No disc herniation as separate diagnosis.

  IMAGING: MRI within 6 months demonstrates structural pathology at
  C5-C6 consistent with symptoms and surgical level. Radiologist
  interpretation.

  CONSERVATIVE TREATMENT: 7 weeks of supervised PT directed at cervical
  condition with documented functional outcomes. Trialed naproxen (NSAID)
  for 5 weeks and gabapentin (neuropathic) for 5 weeks. One cervical
  epidural steroid injection completed.

  MYELOPATHY EXCEPTION: Not applicable (no myelopathy).

  PHYSICIAN DOCUMENTATION: All four elements provided — attestation,
  clinical rationale, functional limitations description, risks and
  alternatives statement.
expected_outcomes:
  pa.D1: "true"
  pa.D2: "false"
