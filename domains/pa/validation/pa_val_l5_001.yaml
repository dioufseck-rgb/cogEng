description: |
  PA request with documentation gaps on critical evidence elements.

  DIAGNOSIS: Cervical radiculopathy at C5-C6 with confirmed nerve root
  compression. Radicular pain in C5 dermatomal distribution. No
  cervical myelopathy. No disc herniation as separate diagnosis.

  IMAGING: MRI within 6 months demonstrates pathology at C5-C6
  consistent with symptoms and surgical level. Radiologist
  interpretation.

  CONSERVATIVE TREATMENT - PHYSICAL THERAPY: Member completed physical
  therapy directed at the cervical condition. The exact duration of
  the PT course is not documented in the available record. Whether
  the therapy was supervised is not documented. Whether functional
  outcomes were documented during therapy is not stated.

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Trialed naproxen and
  gabapentin. The trial durations are not documented for either
  agent.

  CONSERVATIVE TREATMENT - INTERVENTIONAL: One cervical epidural
  steroid injection completed.

  PHYSICIAN DOCUMENTATION: All four elements provided.
