authoring_notes: |
  Real appeal case PA-2024-G006 (Cognitive Core appeals corpus),
  flattened with FULL ADJUDICATION PACKET including the original
  denial document, prior PA history, and appellant's stated
  grounds. The clinical record portion is identical to
  pa-appeal-G006-merits.

  Tests two questions:
  (1) Does Map bind the distractor text to spurious atoms?
      (e.g., does "prior PA denial history" get pulled into an
      atom about "treatment history" or "prior surgical history"?)
  (2) Does the determination remain correct when the case
      description contains 60% non-criterion material?

  Note: RuleKit's atoms encode CC-SPINE-2024 surgical criteria,
  not the meta-policy "denials must cite authorized criteria."
  RuleKit cannot, by construction, evaluate the procedural-flaw
  question. The expected outcome here measures correctness of
  the merits determination only. The Stage-2-narrator question
  (does the trace + denial enable score-2 reasoning?) is
  separate and tested by inspecting the trace, not the
  determination.
