description: |
  Member Theresa Kamau, age 52. Request: ACDF C5-C6, single level
  (CPT 22551). Requested by Dr. Victor Osei, Spine Surgery, UCSF
  Medical Center.

  DIAGNOSIS: Cervical radiculopathy C5-C6, progressive, persistent
  after conservative treatment. Right C6 nerve root compression.

  IMAGING: MRI of cervical spine performed 2024-10-15 (within 6
  months of request). Findings: large C5-C6 disc herniation with
  moderate-severe right C6 nerve root compression; new foraminal
  stenosis at C5-C6. Interval increase in size from prior MRI
  (2024-04-20). Interpreted by radiologist. Pathology consistent
  with symptoms and proposed surgical level (C5-C6).

  NEUROLOGICAL EXAM 2024-10-20: Right C6 dermatomal numbness.
  Bicep reflex absent on the right. Bicep weakness 3+/5 right
  (interval worsening from prior exam). Pain 8/10 at rest. Unable
  to continue working full-time. Objective neurological deficit
  documented.

  CONSERVATIVE TREATMENT - PHYSICAL THERAPY: 8 weeks of supervised
  physical therapy completed July-September 2024 (24 sessions
  total). Therapy directed at cervical condition. Functional
  plateau explicitly documented: "no further improvement expected,
  neurological deficit persistent and worsening."

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Two pharmacotherapy
  agents trialed. (1) Gabapentin 600mg TID for 6 months
  (neuropathic agent) — partial pain relief, deficit persists.
  (2) Methylprednisolone dose pack x2 courses (oral
  corticosteroid) — temporary relief only.

  CONSERVATIVE TREATMENT - INTERVENTIONAL: Right C6 cervical
  epidural steroid injection performed 2024-11-05. Response: 50%
  relief for 2 weeks, returned to baseline.

  MYELOPATHY EXCEPTION: Not applicable. Diagnosis is cervical
  radiculopathy, not myelopathy. No gait disturbance, no
  hyperreflexia documented, no bilateral upper extremity
  weakness, no Hoffman sign, no bowel/bladder dysfunction.
  Standard conservative treatment requirements apply.

  PHYSICIAN DOCUMENTATION: Surgeon's letter affirms conservative
  treatment completion, provides clinical rationale for surgical
  intervention, describes functional limitations (unable to work
  full-time), and states surgical risks and the alternative of
  continued non-operative management considered.
expected_outcomes:
