  - alternative_terminology
description: |
  Mr. Patel is a 54-year-old engineer who has been suffering with neck
  problems for over a year. He's tried just about everything short of
  surgery, and his pain specialist is recommending he move forward
  with an operation now.

  Workup: His MRI from August (about two months back) clearly showed
  what the neurologist called "compression of the C5 nerve root from
  bone spurs and a small disc bulge." That's where the pain
  radiates — down the front of his shoulder and into his thumb. The
  exam picks up some weakness in elbow flexion on that side too. The
  radiologist's read matches the proposed surgical site at C5-C6.
  No signs of broader cord involvement: walking is normal, no
  hand-fumbling, reflexes are normal-to-brisk but not pathologic, no
  Hoffman elicited, no bladder issues.

  Conservative care has been the focus for most of the year. He
  completed about two months of supervised PT through the local rehab
  clinic, with the therapist tracking goal attainment week to week —
  notes show steady but limited progress on cervical-directed
  exercises. On the medication side, he was on naproxen at standard
  dosing for over a month, then transitioned to gabapentin (also for
  more than a month) when the nerve symptoms didn't respond. The pain
  doctor performed one steroid injection at C5-C6 in September.

  His surgeon's letter affirms conservative care was completed,
  walks through the rationale for moving to operative intervention,
  describes how the symptoms have limited Mr. Patel's daily and work
  activities, and discusses surgical risks and the alternative of
  continued non-operative management.
expected_outcomes:
  pa.D1: "true"
  pa.D2: "false"
load_bearing_annotation:
  - Nerve root compression with C5 radicular pain (= radiculopathy)
  - MRI within 6 months at surgical level
  - 8 weeks supervised cervical-directed PT with progress documentation
  - NSAID (naproxen) and neuropathic agent (gabapentin) each trialed >4 weeks
  - One cervical epidural steroid injection
  - All four physician documentation elements (in letter form)
authoring_notes: |
  Level 7: same underlying facts as a Level 1 case but rendered in
  narrative-clinical voice rather than structured headings. Tests
  Map's robustness to surface-form variation. The terminology
  ("bone spurs and small disc bulge," "two months back," "about
  two months of PT") is informal but extracts to the same atomic
  truth values.
