case_id: pa-l3-exception-001
policy: pa
difficulty_level: 3
case_class: main
tags:
  - myelopathy_exception
  - waiver_invoked
description: |
  PA request via the myelopathy exception pathway, with interventional
  waiver invoked.

  DIAGNOSIS: Cervical myelopathy as the primary documented diagnosis,
  confirmed with spinal cord compression at C4-C5 on MRI. Member
  exhibits gait disturbance, bilateral upper extremity weakness,
  hyperreflexia, and positive Hoffman sign. No bowel/bladder
  dysfunction. No cervical radiculopathy as primary complaint;
  myelopathy is documented as primary, not secondary to a
  radiculopathy.

  IMAGING: MRI 1 month ago demonstrates cord compression at C4-C5
  consistent with myelopathic symptoms and the proposed surgical
  level. Radiologist interpretation.

  CONSERVATIVE TREATMENT - PHYSICAL THERAPY (exception pathway):
  4 weeks of supervised PT directed at the cervical condition with
  documented functional outcomes. Meets the reduced exception
  threshold of 4 weeks. Did NOT complete the standard 6-week
  minimum.

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY (full requirement):
  Trialed naproxen 500mg BID for 6 weeks (NSAID) and gabapentin
  300mg TID for 5 weeks (neuropathic agent).

  CONSERVATIVE TREATMENT - INTERVENTIONAL (waived): Treating
  physician has documented in writing that interventional treatment
  poses risk of neurological deterioration given the myelopathic
  findings. Interventional treatment is waived. No ESI, no medial
  branch block, no trigger point injection.

  PHYSICIAN DOCUMENTATION: All four elements provided.
expected_outcomes:
  pa.D1: "true"
  pa.D2: "false"
load_bearing_annotation:
  - Cervical myelopathy is the primary diagnosis (criterion 2.1(b))
  - Imaging confirms cord compression at surgical level
  - 4 weeks PT (exception threshold met)
  - Two pharmacotherapy classes ≥4 weeks (full requirement preserved)
  - Physician documented interventional risk → waiver invoked
authoring_notes: |
  Tests exception pathway with both modifications: reduced PT
  threshold (4 weeks vs. 6 standard) AND interventional waiver
  based on documented neurological-deterioration risk.
