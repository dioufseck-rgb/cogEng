case_id: pa-adv-llm-001
policy: pa
difficulty_level: 8
case_class: adversarial_llm
tags:
  - adversarial_llm
  - boundary_tightening
  - exception_pathway_detail
description: |
  PA request where the case looks like it should succeed under the
  myelopathy exception, but a specific provision excludes it.

  DIAGNOSIS: Cervical myelopathy diagnosed, with cord compression at
  C4-C5 on MRI. Member exhibits gait disturbance and hyperreflexia.
  HOWEVER: the treating physician's documentation describes
  myelopathy as a SECONDARY finding; the primary presenting
  complaint and primary diagnosis is cervical radiculopathy at C5
  with classical radicular pain. The myelopathic findings were
  discovered incidentally during workup for the radiculopathy.

  Per policy NOTE under criterion 2.2 exception: "The myelopathy
  exception applies only when myelopathy is the PRIMARY diagnosis."

  In this case, myelopathy is documented but NOT as primary; the
  primary complaint is radiculopathy. Therefore, the exception
  pathway does NOT apply, and standard conservative-treatment
  requirements (6 weeks PT, full pharmacotherapy, interventional)
  apply.

  IMAGING: MRI within 6 months, structural pathology at C5-C6
  consistent with radicular symptoms. Radiologist interpretation.

  CONSERVATIVE TREATMENT - PT: Only 4 weeks supervised PT (which
  would satisfy the exception pathway IF the exception applied,
  but does NOT satisfy the standard 6-week requirement).

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Naproxen 5 weeks,
  gabapentin 5 weeks.

  CONSERVATIVE TREATMENT - INTERVENTIONAL: Treating physician
  documented interventional risk for the myelopathic findings;
  however, the waiver clause only applies when the myelopathy
  exception is invoked, which requires primary myelopathy. No
  interventional treatment performed.

  PHYSICIAN DOCUMENTATION: All four elements provided.
expected_outcomes:
  pa.D1: "false"
  pa.D2: "true"
load_bearing_annotation:
  - Myelopathy is documented but as SECONDARY, not primary → exception does not apply
  - PT only 4 weeks → standard requirement of 6 weeks not met
  - Interventional waiver cannot be invoked outside the exception → 2.2(c) not met
authoring_notes: |
  Adversarial LLM: tests careful reading of the exception's
  "primary diagnosis" condition. The case looks like an exception
  pathway case at first glance — myelopathy diagnosed, 4 weeks PT,
  interventional risk documented. But primary vs. secondary
  distinction excludes it. A direct-LLM judge that smooths over
  the "primary" requirement may erroneously approve.
