case_id: pa-l6-multipath-001
policy: pa
difficulty_level: 6
case_class: main
tags:
  - multipath
  - standard_and_exception_plausible
description: |
  PA request where both standard and exception pathways have some
  documented support.

  DIAGNOSIS: Cervical myelopathy at C5-C6, confirmed with cord
  compression on MRI. Member exhibits gait disturbance and
  hyperreflexia. No bilateral UE weakness, no Hoffman sign, no
  bowel/bladder dysfunction. Member ALSO has nerve root compression
  at C5-C6 with radicular pain in C5 distribution, but myelopathy
  is documented as the primary diagnosis (not secondary to
  radiculopathy).

  IMAGING: MRI 2 months ago demonstrates both cord compression and
  foraminal stenosis at C5-C6, consistent with symptoms and surgical
  level. Radiologist interpretation.

  CONSERVATIVE TREATMENT - PT: 6 weeks of supervised PT directed at
  cervical with documented functional outcomes. (Meets both standard
  6-week minimum and exception 4-week minimum.)

  CONSERVATIVE TREATMENT - PHARMACOTHERAPY: Trialed naproxen for 6
  weeks and gabapentin for 5 weeks.

  CONSERVATIVE TREATMENT - INTERVENTIONAL: One cervical epidural
  steroid injection completed. (Treating physician did not document
  any interventional risk; waiver not invoked. ESI satisfies standard
  pathway directly.)

  PHYSICIAN DOCUMENTATION: All four elements provided.
expected_outcomes:
  pa.D1: "true"
  pa.D2: "false"
load_bearing_annotation:
  - Qualifying diagnosis satisfied via myelopathy (and also radiculopathy)
  - 6 weeks PT satisfies both pathway thresholds
  - Two pharmacotherapy classes ≥4 weeks
  - ESI completed (standard pathway interventional)
authoring_notes: |
  Level 6: both pathways evaluable as TRUE. Tests that the
  OR-of-pathways correctly produces TRUE when either branch is
  satisfied, regardless of which.
