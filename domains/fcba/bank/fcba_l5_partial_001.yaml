case_id: fcba-l5-partial-001
policy: fcba
difficulty_level: 5
case_class: main
tags:
  - partial_evidence
  - load_bearing_gap
description: |
  Credit card dispute with incomplete investigation on a load-bearing
  authority question.

  The cardholder's statement reflects a $267.40 extension of credit
  to a merchant the cardholder does not recognize.

  The cardholder states they did not make the transaction themselves.

  Whether any other person had actual, implied, or apparent authority
  to use the cardholder's card is not yet established. The
  cardholder's spouse uses the card occasionally; whether the spouse
  made this specific transaction has not been determined. The
  investigation into spousal authorized use is incomplete at the time
  of this dispute filing.

  The transaction was properly identified per Regulation Z. No
  property-or-services dispute. No payment-crediting. No
  computational error. No documentary-evidence framing. Statement
  mailed and delivered.
expected_outcomes:
  fcba.D1: "undetermined"
  fcba.D2: "undetermined"
load_bearing_annotation:
  - Whether spouse had authority — undetermined (load-bearing)
  - Whether spouse made the transaction — undetermined (load-bearing)
authoring_notes: |
  Level 5: load-bearing gap on the authority-to-use question.
  Expected: UNDETERMINED, honestly reported. Tests that the system
  doesn't conclude "unauthorized" prematurely when the authority
  investigation is incomplete.
