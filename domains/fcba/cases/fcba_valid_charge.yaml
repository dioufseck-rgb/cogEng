case_id: fcba-valid-charge

description: |
  Credit card transaction that the consumer questions but that does
  not constitute a billing error under § 1026.13(a).

  The consumer's periodic credit card statement reflects an extension
  of credit of $89.50 to a streaming service. The consumer initially
  did not recognize the charge and contacted the creditor.

  The consumer subsequently confirmed they DID make the transaction.
  The charge was for a streaming service subscription the consumer had
  signed up for and forgotten about. The consumer authorized the
  charge at the time of subscription.

  No question of unauthorized use. The transaction was made by the
  consumer; no one else used the card. The consumer (cardholder) had
  full authority over the transaction.

  The transaction was properly identified on the periodic statement
  per the formatting requirements of Regulation Z. The merchant name
  and amount were clearly listed.

  No property-or-services dispute. The streaming service was delivered
  as agreed (the consumer had access to the service for the billing
  period). The consumer accepted the services by using them.

  No failure-to-credit issue. The consumer made no payment that needed
  to be credited differently. No computational or accounting error;
  the math on the statement is correct.

  No request for clarification or documentary evidence under
  § 1026.13(a)(6) — once the consumer recognized the charge they did
  not pursue this category.

  The creditor did mail and did deliver a periodic statement to the
  consumer.

expected_outcomes:
  fcba.D1: false
  fcba.D2: true
