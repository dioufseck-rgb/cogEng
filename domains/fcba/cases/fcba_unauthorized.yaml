case_id: fcba-unauthorized

description: |
  Credit card billing error dispute. The cardholder reports an
  unauthorized charge.

  The consumer's periodic credit card statement reflects an extension
  of credit of $487.32 to an online merchant the consumer does not
  recognize. The transaction was posted on the statement period in
  question.

  The consumer did NOT make the transaction. The consumer was not
  using the card at the time of the transaction. The consumer's
  physical card was in their possession; they suspect the card number
  was compromised in a data breach.

  No other person had authority to use the consumer's account.
  Specifically: no authorized user had been added to the account. No
  family member had actual, implied, or apparent authority to use the
  card. The consumer did not lend the card to anyone or give anyone
  permission to use it.

  The transaction was properly identified on the statement per the
  formatting requirements of Regulation Z (sections 1026.7 and
  1026.8).

  The transaction is NOT a property-or-services dispute. The
  transaction is not about goods that were not delivered or not
  accepted by the consumer or the consumer's designee. The consumer
  is not claiming the merchant failed to deliver something.

  There is no failure-to-credit issue. There is no computational or
  accounting error on the statement. The consumer has not requested
  clarification or documentary evidence as the basis of the dispute;
  the basis is that the charge was unauthorized.

  The creditor did mail and did deliver a periodic statement to the
  consumer.

expected_outcomes:
  fcba.D1: true
  fcba.D2: false
