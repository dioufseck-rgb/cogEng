case_id: fcba-val-l3-001
policy: fcba
difficulty_level: 3
case_class: validation
tags:
  - alternate_pathway
  - non_delivery
  - validation
description: |
  Credit card dispute on the property-or-services non-delivery
  pathway under § 1026.13(a)(3).

  The cardholder's periodic statement reflects a $1,200 extension of
  credit to a vacation rental company for a one-week stay scheduled
  for the prior month.

  The cardholder did make the transaction. The cardholder authorized
  the booking at the time and used their own card.

  The transaction was properly identified on the periodic statement
  per Regulation Z formatting.

  Property-or-services non-delivery: the transaction was for services
  (a vacation rental). The services were not delivered as agreed —
  the rental property was uninhabitable on arrival due to undisclosed
  water damage, and the rental company refused to provide an
  alternative or a refund. The cardholder did not accept the
  services (arrived, found the property uninhabitable, left
  immediately). The services were not accepted by any designee of
  the cardholder either.

  No unauthorized-use issue (cardholder made the transaction). No
  payment-crediting issue. No computational error. The cardholder is
  not framing this as a request for clarification under
  § 1026.13(a)(6); the dispute is about non-delivery.

  The creditor did mail and deliver the periodic statement.
expected_outcomes:
  fcba.D1: "true"
  fcba.D2: "false"
load_bearing_annotation:
  - Extension of credit for property or services
  - Services not delivered as agreed (or not accepted by consumer/designee)
authoring_notes: |
  Validation Level 3: tests the alternate billing-error pathway
  under § 1026.13(a)(3) (non-delivery of services). Distinct from
  the unauthorized-charge pathway in L1.
