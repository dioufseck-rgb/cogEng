case_id: fcba-val-l1-001
policy: fcba
difficulty_level: 1
case_class: validation
tags:
  - canonical_positive
  - unauthorized_charge
  - validation
description: |
  Credit card billing-error dispute submitted by the cardholder.

  The cardholder's periodic statement reflects a $487.32 extension of
  credit to an online merchant the cardholder does not recognize. The
  transaction was posted during the statement period in question.

  The cardholder did not make the transaction. The cardholder was not
  using the card at the time of the transaction. The physical card
  was in the cardholder's possession; the cardholder suspects the
  card number was compromised in a data breach.

  No other person had actual, implied, or apparent authority to use
  the cardholder's account. No authorized user has been added to the
  account. No family member had any form of authority over the card.
  The cardholder did not lend the card to anyone or give anyone
  permission to use it.

  The transaction was properly identified on the periodic statement
  in accordance with Regulation Z formatting requirements
  (§§ 1026.7(a)(2) or (b)(2) and 1026.8).

  The transaction is not about property or services that were not
  delivered or not accepted. There is no payment-crediting issue. No
  computational or accounting error on the statement. The cardholder
  has not requested clarification or documentary evidence as the
  basis of the dispute; the basis is that the charge was
  unauthorized.

  The creditor did mail and deliver the periodic statement.
expected_outcomes:
  fcba.D1: "true"
  fcba.D2: "false"
load_bearing_annotation:
  - Extension of credit reflected on the periodic statement
  - Cardholder did not make the transaction
  - No other person with actual, implied, or apparent authority
authoring_notes: |
  Validation Level 1 (canonical positive) — unauthorized charge
  category § 1026.13(a)(1). The cleanest case of billing-error
  qualification.
