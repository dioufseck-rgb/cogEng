<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <rect width="900" height="520" fill="white"/>

  <text x="450" y="32" font-size="18" font-weight="bold" text-anchor="middle" fill="#222">Two Pipelines: Build Time and Run Time</text>

  <!-- BUILD TIME row -->
  <rect x="40" y="65" width="820" height="180" fill="#F4F7FC" stroke="#2E75B6" stroke-width="1.5" rx="6"/>
  <text x="60" y="90" font-size="13" font-weight="bold" fill="#1f4e79">BUILD TIME</text>
  <text x="60" y="108" font-size="11" font-style="italic" fill="#666">slow, once per policy, version-controlled</text>

  <!-- Build inputs -->
  <rect x="65" y="135" width="135" height="85" fill="white" stroke="#888" stroke-width="1" rx="4"/>
  <text x="132" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#222">Inputs</text>
  <text x="132" y="173" font-size="10" text-anchor="middle" fill="#444">policy text</text>
  <text x="132" y="188" font-size="10" text-anchor="middle" fill="#444">determination spec</text>
  <text x="132" y="203" font-size="10" text-anchor="middle" fill="#444">reader voice</text>

  <!-- Arrow -->
  <path d="M 205 178 L 245 178" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#arrow1)"/>

  <!-- Build pipeline -->
  <rect x="250" y="135" width="370" height="85" fill="#E8F1FB" stroke="#2E75B6" stroke-width="1.5" rx="4"/>
  <text x="435" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f4e79">Build pipeline (4 LLM stages + engine)</text>
  <text x="435" y="178" font-size="10" text-anchor="middle" fill="#444">decompose → deduplicate → refine → engine-convert</text>
  <text x="435" y="200" font-size="10" font-style="italic" text-anchor="middle" fill="#666">domain expert review of audit trail + flagged sub-trees</text>

  <!-- Arrow -->
  <path d="M 625 178 L 665 178" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#arrow1)"/>

  <!-- DAG output -->
  <rect x="670" y="135" width="170" height="85" fill="white" stroke="#888" stroke-width="1" rx="4"/>
  <text x="755" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#222">DAG</text>
  <text x="755" y="173" font-size="10" text-anchor="middle" fill="#444">typed operators</text>
  <text x="755" y="188" font-size="10" text-anchor="middle" fill="#444">atom inventory</text>
  <text x="755" y="203" font-size="10" text-anchor="middle" fill="#444">audit trail</text>

  <!-- arrow connecting DAG down to runtime -->
  <path d="M 755 220 L 755 290" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#arrow1)" stroke-dasharray="4,3"/>
  <text x="775" y="260" font-size="10" font-style="italic" fill="#666">DAG deployed</text>

  <!-- RUN TIME row -->
  <rect x="40" y="285" width="820" height="195" fill="#FFFAF0" stroke="#D08770" stroke-width="1.5" rx="6"/>
  <text x="60" y="310" font-size="13" font-weight="bold" fill="#a04e2c">RUN TIME</text>
  <text x="60" y="328" font-size="11" font-style="italic" fill="#666">fast, once per case, deterministic given inputs</text>

  <!-- Case in -->
  <rect x="65" y="355" width="135" height="85" fill="white" stroke="#888" stroke-width="1" rx="4"/>
  <text x="132" y="375" font-size="11" font-weight="bold" text-anchor="middle" fill="#222">Case evidence</text>
  <text x="132" y="392" font-size="10" text-anchor="middle" fill="#444">narrative,</text>
  <text x="132" y="407" font-size="10" text-anchor="middle" fill="#444">structured records,</text>
  <text x="132" y="422" font-size="10" text-anchor="middle" fill="#444">or hybrid</text>

  <!-- Arrow -->
  <path d="M 205 397 L 245 397" stroke="#D08770" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Map -->
  <rect x="250" y="355" width="160" height="85" fill="#FBE8DA" stroke="#D08770" stroke-width="1.5" rx="4"/>
  <text x="330" y="375" font-size="12" font-weight="bold" text-anchor="middle" fill="#a04e2c">Map primitive</text>
  <text x="330" y="394" font-size="10" text-anchor="middle" fill="#444">evidence × atoms</text>
  <text x="330" y="409" font-size="10" text-anchor="middle" fill="#444">→ fact bundle</text>
  <text x="330" y="424" font-size="10" font-style="italic" text-anchor="middle" fill="#666">substrate-specific</text>

  <!-- Arrow -->
  <path d="M 415 397 L 455 397" stroke="#D08770" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Evaluate -->
  <rect x="460" y="355" width="160" height="85" fill="#FBE8DA" stroke="#D08770" stroke-width="1.5" rx="4"/>
  <text x="540" y="375" font-size="12" font-weight="bold" text-anchor="middle" fill="#a04e2c">Evaluate</text>
  <text x="540" y="394" font-size="10" text-anchor="middle" fill="#444">bundle × DAG</text>
  <text x="540" y="409" font-size="10" text-anchor="middle" fill="#444">→ determination</text>
  <text x="540" y="424" font-size="10" font-style="italic" text-anchor="middle" fill="#666">Kleene three-valued</text>

  <!-- Arrow -->
  <path d="M 625 397 L 665 397" stroke="#D08770" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Output -->
  <rect x="670" y="355" width="170" height="85" fill="white" stroke="#888" stroke-width="1" rx="4"/>
  <text x="755" y="375" font-size="11" font-weight="bold" text-anchor="middle" fill="#222">Output</text>
  <text x="755" y="393" font-size="10" text-anchor="middle" fill="#444">TRUE / FALSE / U</text>
  <text x="755" y="410" font-size="10" text-anchor="middle" fill="#444">+ evaluation trace</text>
  <text x="755" y="425" font-size="10" font-style="italic" text-anchor="middle" fill="#666">auditable</text>

  <!-- Bottom caption -->
  <text x="450" y="465" font-size="11" font-style="italic" text-anchor="middle" fill="#444">The DAG is the policy as a logical model. Same case + same DAG → same outcome, always.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E75B6"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D08770"/>
    </marker>
  </defs>
</svg>
