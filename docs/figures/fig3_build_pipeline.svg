<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <rect width="900" height="600" fill="white"/>

  <text x="450" y="32" font-size="18" font-weight="bold" text-anchor="middle" fill="#222">The Build Pipeline</text>
  <text x="450" y="52" font-size="12" text-anchor="middle" fill="#666">Policy text → DAG, via four LLM-driven stages and one deterministic stage</text>

  <!-- Stage 1: Decomposition -->
  <rect x="60" y="80" width="780" height="100" fill="#E8F1FB" stroke="#2E75B6" stroke-width="1.5" rx="6"/>
  <text x="80" y="105" font-size="13" font-weight="bold" fill="#1f4e79">1. Decomposition</text>
  <text x="80" y="124" font-size="11" fill="#444">Recursive: each LLM call takes one claim, returns either a leaf or (operator, child claims).</text>
  <text x="80" y="142" font-size="11" fill="#444">Recursion terminates when every path reaches an atomic claim.</text>
  <text x="80" y="160" font-size="11" font-style="italic" fill="#666">Operators: AND, OR, NOT, AT-LEAST-N. Atomicity calibrated via in-prompt examples.</text>

  <!-- arrow -->
  <path d="M 450 185 L 450 210" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#a3)"/>

  <!-- Stage 2: Deduplication -->
  <rect x="60" y="215" width="780" height="80" fill="#E8F1FB" stroke="#2E75B6" stroke-width="1.5" rx="6"/>
  <text x="80" y="240" font-size="13" font-weight="bold" fill="#1f4e79">2. Deduplication</text>
  <text x="80" y="258" font-size="11" fill="#444">Single LLM call identifies semantically equivalent atoms across determinations.</text>
  <text x="80" y="276" font-size="11" font-style="italic" fill="#666">Equivalence groups share atom IDs → forest of trees becomes a DAG (shared sub-trees).</text>

  <!-- arrow -->
  <path d="M 450 300 L 450 325" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#a3)"/>

  <!-- Stage 3: Refinement -->
  <rect x="60" y="330" width="780" height="100" fill="#E8F1FB" stroke="#2E75B6" stroke-width="1.5" rx="6"/>
  <text x="80" y="355" font-size="13" font-weight="bold" fill="#1f4e79">3. Refinement</text>
  <text x="80" y="374" font-size="11" fill="#444">LLM identifies refinement operations on each tree:</text>
  <text x="95" y="392" font-size="11" fill="#444">• drop child (e.g., a leaf that summarizes what its siblings already decompose)</text>
  <text x="95" y="408" font-size="11" fill="#444">• merge equivalent children • flag low-confidence inferred sub-tree for human review</text>
  <text x="80" y="425" font-size="11" font-style="italic" fill="#666">Deterministic applier rewrites the tree; bottom-up simplifies degenerate operators.</text>

  <!-- arrow -->
  <path d="M 450 435 L 450 460" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#a3)"/>

  <!-- Stage 4: Engine conversion -->
  <rect x="60" y="465" width="780" height="100" fill="#F0F6E8" stroke="#5A8C45" stroke-width="1.5" rx="6"/>
  <text x="80" y="490" font-size="13" font-weight="bold" fill="#2c5d1b">4. Engine conversion (deterministic)</text>
  <text x="80" y="509" font-size="11" fill="#444">Refined node specs → typed engine nodes (AndNode, OrNode, NotNode, AtLeastNode).</text>
  <text x="80" y="527" font-size="11" fill="#444">Atom inventory built with source span, provenance, confidence metadata.</text>
  <text x="80" y="545" font-size="11" font-style="italic" fill="#666">Complement determinations wrapped as NOT-nodes around their linked counterpart.</text>

  <defs>
    <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E75B6"/>
    </marker>
  </defs>
</svg>
