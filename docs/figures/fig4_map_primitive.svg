<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Arial, sans-serif">
  <rect width="900" height="540" fill="white"/>

  <text x="450" y="32" font-size="18" font-weight="bold" text-anchor="middle" fill="#222">The Map Primitive: Evidence → Fact Bundle</text>
  <text x="450" y="52" font-size="12" text-anchor="middle" fill="#666">A morphism from evidence space to atom truth-value space, configurable per evidence type</text>

  <!-- Evidence types on left -->
  <text x="160" y="95" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Evidence types</text>

  <rect x="60" y="110" width="200" height="65" fill="#FBE8DA" stroke="#D08770" stroke-width="1.2" rx="4"/>
  <text x="160" y="132" font-size="11" font-weight="bold" text-anchor="middle" fill="#a04e2c">Narrative</text>
  <text x="160" y="151" font-size="10" text-anchor="middle" fill="#444">clinical notes, dispute</text>
  <text x="160" y="165" font-size="10" text-anchor="middle" fill="#444">files, free-text intake</text>

  <rect x="60" y="190" width="200" height="65" fill="#FBE8DA" stroke="#D08770" stroke-width="1.2" rx="4"/>
  <text x="160" y="212" font-size="11" font-weight="bold" text-anchor="middle" fill="#a04e2c">Structured</text>
  <text x="160" y="231" font-size="10" text-anchor="middle" fill="#444">claims tables, transaction</text>
  <text x="160" y="245" font-size="10" text-anchor="middle" fill="#444">logs, EHR data</text>

  <rect x="60" y="270" width="200" height="65" fill="#FBE8DA" stroke="#D08770" stroke-width="1.2" rx="4"/>
  <text x="160" y="292" font-size="11" font-weight="bold" text-anchor="middle" fill="#a04e2c">Hybrid</text>
  <text x="160" y="311" font-size="10" text-anchor="middle" fill="#444">mixed sources,</text>
  <text x="160" y="325" font-size="10" text-anchor="middle" fill="#444">dispatched per atom</text>

  <!-- arrows from evidence to substrates -->
  <path d="M 265 142 L 360 142" stroke="#D08770" stroke-width="2" fill="none" marker-end="url(#a4)"/>
  <path d="M 265 222 L 360 222" stroke="#D08770" stroke-width="2" fill="none" marker-end="url(#a4)"/>
  <path d="M 265 302 L 360 302" stroke="#D08770" stroke-width="2" fill="none" marker-end="url(#a4)"/>

  <!-- Substrate implementations in middle -->
  <text x="450" y="95" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Substrate implementations</text>

  <rect x="365" y="110" width="170" height="65" fill="#E8F1FB" stroke="#2E75B6" stroke-width="1.2" rx="4"/>
  <text x="450" y="132" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f4e79">NarrativeLLM</text>
  <text x="450" y="151" font-size="10" text-anchor="middle" fill="#444">one LLM call binds</text>
  <text x="450" y="165" font-size="10" text-anchor="middle" fill="#444">case to each atom</text>

  <rect x="365" y="190" width="170" height="65" fill="#E8F1FB" stroke="#2E75B6" stroke-width="1.2" rx="4"/>
  <text x="450" y="212" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f4e79">StructuredQuery</text>
  <text x="450" y="231" font-size="10" text-anchor="middle" fill="#444">DB queries +</text>
  <text x="450" y="245" font-size="10" text-anchor="middle" fill="#444">configured predicates</text>

  <rect x="365" y="270" width="170" height="65" fill="#E8F1FB" stroke="#2E75B6" stroke-width="1.2" rx="4"/>
  <text x="450" y="292" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f4e79">Hybrid dispatcher</text>
  <text x="450" y="311" font-size="10" text-anchor="middle" fill="#444">routes per atom-type</text>
  <text x="450" y="325" font-size="10" text-anchor="middle" fill="#444">to specific substrate</text>

  <!-- merge to Map -->
  <path d="M 540 142 Q 590 142 600 222" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#a4b)"/>
  <path d="M 540 222 L 600 222" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#a4b)"/>
  <path d="M 540 302 Q 590 302 600 222" stroke="#2E75B6" stroke-width="2" fill="none" marker-end="url(#a4b)"/>

  <!-- Map interface box -->
  <rect x="605" y="200" width="80" height="45" fill="#fff" stroke="#2E75B6" stroke-width="1.5" rx="4" stroke-dasharray="3,2"/>
  <text x="645" y="220" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f4e79">Substrate</text>
  <text x="645" y="234" font-size="10" font-style="italic" text-anchor="middle" fill="#666">interface</text>

  <path d="M 690 222 L 730 222" stroke="#1f4e79" stroke-width="2" fill="none" marker-end="url(#a4c)"/>

  <!-- Output -->
  <rect x="735" y="190" width="135" height="65" fill="white" stroke="#888" stroke-width="1" rx="4"/>
  <text x="802" y="212" font-size="11" font-weight="bold" text-anchor="middle" fill="#222">FactBundle</text>
  <text x="802" y="230" font-size="10" text-anchor="middle" fill="#444">atom_id → T/F/U</text>
  <text x="802" y="245" font-size="10" font-style="italic" text-anchor="middle" fill="#666">build-relative</text>

  <!-- Bottom box: separation principle -->
  <rect x="60" y="370" width="810" height="140" fill="#F9F9F4" stroke="#888" stroke-width="1" rx="6"/>
  <text x="80" y="395" font-size="13" font-weight="bold" fill="#222">Architectural separation</text>
  <text x="80" y="418" font-size="11" fill="#333">• Build is case-independent. The DAG knows nothing about specific cases.</text>
  <text x="80" y="438" font-size="11" fill="#333">• Map is case-and-build-relative. Same case + different build → different bundle (different atom IDs).</text>
  <text x="80" y="458" font-size="11" fill="#333">• Evaluate is bundle-and-DAG relative. Pure logic; no LLM in the loop.</text>
  <text x="80" y="482" font-size="11" font-style="italic" fill="#555">Architectural stability test: same case across two builds of the same policy should yield the</text>
  <text x="80" y="498" font-size="11" font-style="italic" fill="#555">same determination, even if the atom IDs and tree structures differ.</text>

  <defs>
    <marker id="a4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D08770"/>
    </marker>
    <marker id="a4b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E75B6"/>
    </marker>
    <marker id="a4c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
  </defs>
</svg>
